    <script>
        const scrollElements = document.querySelectorAll('.scroll-float');

const observer = new IntersectionObserver(
    (entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible'); // animate in
            } else {
                entry.target.classList.remove('visible'); // optional: animate out
            }
        });
    },
    {
        threshold: 0.1 // trigger when 10% of the element is visible
    }
);

scrollElements.forEach(el => observer.observe(el));
    </script>

<script>
  let allEvents = [];
  
  // 🔥 FETCH
  async function getEvents() {
    const res = await fetch("https://opensheet.elk.sh/1hO_hHLDsapkubvSUFM5OMzvpfow2R5s9vPtCH2sXIRY/Event");
    return await res.json();
  }
  
  // 🔥 PARSE GERMAN DATE
  function parseGermanDate(dateStr) {
    if (!dateStr) return null;
  
    const months = {
      Januar: 0, Februar: 1, März: 2, April: 3, Mai: 4, Juni: 5,
      Juli: 6, August: 7, September: 8, Oktober: 9, November: 10, Dezember: 11
    };
  
    const parts = dateStr.replace(",", "").split(" ");
  
    const day = parseInt(parts[1]);
    const month = months[parts[2]];
    const year = parseInt(parts[3]);
  
    return new Date(year, month, day);
  }
  
  // 🔥 PARSE TIME RANGE
  function parseGermanTimeRange(dateStr, timeStr) {
    if (!timeStr) return {};
  
    const cleaned = timeStr.replace("Uhr", "").trim();
    const [startRaw, endRaw] = cleaned.split("-");
  
    const parseTime = (time) => {
      if (!time) return null;
      const [h, m] = time.trim().split(".");
      return { h: parseInt(h), m: parseInt(m) || 0 };
    };
  
    const baseDate = parseGermanDate(dateStr);
    if (!baseDate) return {};
  
    const startT = parseTime(startRaw);
    const endT = parseTime(endRaw);
  
    const start = startT
      ? new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate(), startT.h, startT.m)
      : null;
  
    const end = endT
      ? new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate(), endT.h, endT.m)
      : null;
  
    return { start, end };
  }
  
  // 🔥 MAP
  function mapEvent(item) {
    return {
      type: item.Type,
      title: item.Name || "No title",
      date: item.Date,
      time: item.Time,
      location: item.Location || "",
      description: item.Description || "",
      image: item.Image || "https://via.placeholder.com/400x200",
      published: item.Published
    };
  }
  
  // 🔥 FILTERS
  function showUpcoming() {
    const now = new Date();
  
    const upcoming = allEvents.filter(event => {
      const { start } = parseGermanTimeRange(event.date, event.time);
      return start && start > now;
    });
  
    renderEvents(upcoming);
  }
  
  function showPast() {
    const now = new Date();
  
    const past = allEvents.filter(event => {
      const { end, start } = parseGermanTimeRange(event.date, event.time);
      const check = end || start;
      return check && check < now;
    });
  
    renderEvents(past);
  }
  
  function showOngoing() {
    const now = new Date();
  
    const ongoing = allEvents.filter(event => {
      const { start, end } = parseGermanTimeRange(event.date, event.time);
      return start && end && now >= start && now <= end;
    });
  
    renderEvents(ongoing);
  }
  
  function showAll() {
    renderEvents(allEvents);
  }
  
  // 🔥 RENDER
  function renderEvents(events) {
    const container = document.getElementById("events-container");
  
    if (!events.length) {
      container.innerHTML = "<p>No events found.</p>";
      return;
    }
  
    container.innerHTML = events.map(event => `
      <div class="event-card">
        <img src="${event.image}" alt="${event.title}" />
        <div class="event-content">
          <h3>${event.title}</h3>
          <p><strong>Date:</strong> ${event.date}</p>
          <p><strong>Time:</strong> ${event.time}</p>
          <p><strong>Venue:</strong> ${event.location}</p>
          <p>${event.description}</p>
        </div>
      </div>
    `).join("");
  }
  
  // 🔥 INIT
  async function init() {
    const data = await getEvents();
  
    allEvents = data
      .map(mapEvent)
      .filter(item => item.type === "Event" && item.published === "TRUE");
  
    renderEvents(allEvents);
  }
  
  init();
  </script>
