<script id="x92ksl">
    const endpoint = "https://curacajoi.myshopify.com/api/2023-10/graphql.json";
    
    const query = `
        {
        products(first: 50) {
            pageInfo {
            hasNextPage
            endCursor
            }
            edges {
            cursor
            node {
                title
                handle
                images(first: 1) {
                edges {
                    node {
                    url
                    }
                }
                }
                variants(first: 1) {
                edges {
                    node {
                    price {
                        amount
                    }
                    }
                }
                }
            }
            }
        }
        }
        `;
    
    fetch(endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Shopify-Storefront-Access-Token": "48851bf08bbacab3f396747d5ace40eb"
      },
      body: JSON.stringify({ query })
    })
    .then(res => res.json())
    .then(data => {
    const products = data.data.products.edges;
    const container = document.querySelector(".product-grid");

    container.innerHTML = "";


    // 2. Manually add your custom product
    const customProduct = {
        title: "Ein Paradies aus essbaren Stauden",
        image: "uploads/shop/product01.png",
        price: "19,90",
        link: "https://oekobuch.de/buecher/paradiesgarten/"
    };

    container.innerHTML += `
        <div class="customproduct-card">
        <img src="${customProduct.image}" onclick="openModal(this.src)" />
        <div class="product-desc">
        <h3>${customProduct.title}</h3>
        <p>€ ${customProduct.price}</p>
        </div>
        <a href="${customProduct.link}" target="_blank" class="btn">Buy</a>
        </div>
    `;


    // 1. Render Shopify products
    products.forEach(p => {
        const product = p.node;

        const productUrl = `https://curacajoi.myshopify.com/products/${product.handle}`;
        const price = parseFloat(product.variants.edges[0]?.node.price.amount).toFixed(2);

        container.innerHTML += `
        <div class="product-card">
            <img src="${product.images.edges[0]?.node.url}" onclick="openModal(this.src)" />
             <div class="product-desc">
            <h3>${product.title}</h3>
            <p>€ ${price}</p>
            </div>
            <a href="${productUrl}" target="_blank" class="btn">Buy</a>
        </div>
        `;
    });

})
    
    .catch(err => console.error(err));
    </script>

    <script>
        function openModal(src) {
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImg");

    modal.style.display = "flex";
    modalImg.src = src;
}

document.querySelector(".close").onclick = function() {
    document.getElementById("imageModal").style.display = "none";
};
    </script>
