<script id="x92ksl">
    const endpoint = "https://curacajoi.myshopify.com/api/2023-10/graphql.json";
    
    const query = `
{
  products(first: 6) {
    edges {
      node {
        title
        handle
        images(first: 1) {
          edges {
            node {
              url
            }
          }
        }
        variants(first: 1) {
          edges {
            node {
              price {
                amount
              }
            }
          }
        }
      }
    }
  }
}
`;
    
    fetch(endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Shopify-Storefront-Access-Token": "48851bf08bbacab3f396747d5ace40eb"
      },
      body: JSON.stringify({ query })
    })
    .then(res => res.json())
    .then(data => {
      const products = data.data.products.edges;
      const container = document.querySelector(".product-grid");
    
      container.innerHTML = ""; // clear existing
    
      const storeDomain = "https://curacajoi.myshopify.com";

products.forEach(p => {
  const product = p.node;

  const productUrl = `${storeDomain}/products/${product.handle}`;

  container.innerHTML += `
    <div class="product-card">
      <img src="${product.images.edges[0]?.node.url}" />
      <br>
      <br>
      <h3>${product.title}</h3>
      <p>CHF ${product.variants.edges[0]?.node.price.amount}</p>
<br>
      <a href="${productUrl}" target="_blank" class="btn">
        Buy
      </a>
    </div>
  `;
});
    })
    .catch(err => console.error(err));
    </script>
